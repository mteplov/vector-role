---
- name: Install dependencies
  apt:
    name:
      - curl
      - tar
    state: present
    update_cache: true
  become: true

- name: Create vector user bin dir
  file:
    path: /usr/local/bin
    state: directory
  become: true

- name: Download Vector archive
  get_url:
    url: "https://packages.timber.io/vector/latest/vector-0.55.0-x86_64-unknown-linux-gnu.tar.gz"
    dest: /tmp/vector.tar.gz
  become: true

- name: Extract Vector
  unarchive:
    src: /tmp/vector.tar.gz
    dest: /tmp/
    remote_src: yes
  become: true

- name: Move vector binary
  shell: |
    cp /tmp/vector-*/bin/vector /usr/local/bin/vector
    chmod +x /usr/local/bin/vector
  become: true

- name: Create config directory
  file:
    path: /etc/vector
    state: directory
  become: true

- name: Deploy config
  template:
    src: vector.toml.j2
    dest: /etc/vector/vector.toml
  become: true

- name: Create systemd service
  copy:
    dest: /etc/systemd/system/vector.service
    content: |
      [Unit]
      Description=Vector
      After=network.target

      [Service]
      ExecStart=/usr/local/bin/vector
      Restart=always

      [Install]
      WantedBy=multi-user.target
  become: true

- name: Reload systemd
  systemd:
    daemon_reload: true
  become: true

- name: Enable Vector
  systemd:
    name: vector
    state: started
    enabled: true
  become: true
