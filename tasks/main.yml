---
- name: Download Vector package
  get_url:
    url: https://packages.timber.io/vector/latest/vector-amd64.deb
    dest: /tmp/vector.deb

- name: Install Vector
  apt:
    deb: /tmp/vector.deb

- name: Deploy config
  template:
    src: vector.toml.j2
    dest: /etc/vector/vector.toml
  notify: restart vector

- name: Start Vector
  service:
    name: vector
    state: started
    enabled: true
