---
- name: Install dependencies
  apt:
    name:
      - curl
    state: present
    update_cache: true
  become: true

- name: Install Vector 0.55.0
  shell: |
    curl --proto '=https' --tlsv1.2 -sSfL https://sh.vector.dev | VECTOR_VERSION=0.55.0 bash -s -- -y
  args:
    executable: /bin/bash
  become: true

- name: Create Vector config directory
  file:
    path: /etc/vector
    state: directory
    mode: '0755'
  become: true

- name: Deploy config
  template:
    src: vector.toml.j2
    dest: /etc/vector/vector.toml
  notify: restart vector
  become: true

- name: Enable Vector service
  service:
    name: vector
    state: started
    enabled: true
  become: true
