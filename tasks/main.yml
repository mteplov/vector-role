---
- name: Install prerequisites
  apt:
    name:
      - curl
      - gnupg
      - apt-transport-https
    state: present
    update_cache: true
  become: true

- name: Add Vector GPG key
  apt_key:
    url: https://repositories.timber.io/public/vector/gpg.0xA3A3F3A3B0B0C0C0.key
    state: present
  become: true

- name: Add Vector repository
  apt_repository:
    repo: "deb https://repositories.timber.io/public/vector/debian stable main"
    state: present
  become: true

- name: Update apt cache
  apt:
    update_cache: true
  become: true

- name: Install Vector
  apt:
    name: vector
    state: present
  become: true

- name: Deploy config
  template:
    src: vector.toml.j2
    dest: /etc/vector/vector.toml
  notify: restart vector
  become: true

- name: Enable Vector service
  service:
    name: vector
    state: started
    enabled: true
  become: true
